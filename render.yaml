services:
  - type: web
    name: ema-license-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: licdata
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /data/licenses.db
      - key: ADMIN_API_KEY
        generateValue: true
